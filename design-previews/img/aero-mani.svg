<text x="140" y="-95" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#4E6E8E" font-family="JetBrains Mono,monospace">VELOCITY</text>
<text x="140" y="-200" text-anchor="middle" font-size="14" font-weight="500" fill="#15161A">Pace of</text>
