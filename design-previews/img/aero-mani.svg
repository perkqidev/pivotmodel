<circle cx="0" cy="0" r="100" fill="none" stroke="#E6E6E2" stroke-width="0.6" stroke-dasharray="2 4"/>
<path d="M -140 -140 L 140 -140 L 140 140 L -140 140 Z" fill="none" stroke="#4E6E8E" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.5"/>
