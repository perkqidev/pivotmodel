<circle cx="-130" cy="72" r="11"/><circle cx="-40" cy="72" r="11"/>
<circle cx="40" cy="72" r="11"/><circle cx="130" cy="72" r="11"/>
</g>
</g>
<text x="40" y="430" font-size="13" font-weight="500" fill="#FFFFFF">Engineering Leaders</text>
<text x="40" y="456" font-size="11" font-weight="300" fill="#9BB5CC">CTOs · VPs · Directors building the team</text>
