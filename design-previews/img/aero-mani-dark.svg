<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 920" font-family="Manrope,sans-serif"><defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#161921"/><stop offset="100%" stop-color="#0E0F14"/></linearGradient>
<linearGradient id="bgDark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#0E0F14"/></linearGradient>
<linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#B4CADC"/><stop offset="100%" stop-color="#7CA0C7"/></linearGradient>
<linearGradient id="nodeDark" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7CA0C7"/><stop offset="100%" stop-color="#3a546e"/></linearGradient>
<linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7CA0C7"/><stop offset="100%" stop-color="#B4CADC"/></linearGradient>
<linearGradient id="step1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1c2029"/><stop offset="100%" stop-color="#171a22"/></linearGradient>
<linearGradient id="step2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#222632"/><stop offset="100%" stop-color="#1c2029"/></linearGradient>
<linearGradient id="step3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#B4CADC"/><stop offset="100%" stop-color="#7CA0C7"/></linearGradient>
<radialGradient id="centerGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#7CA0C7" stop-opacity="0.4"/><stop offset="100%" stop-color="#7CA0C7" stop-opacity="0"/></radialGradient>
<radialGradient id="softGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#B4CADC" stop-opacity="0.35"/><stop offset="100%" stop-color="#B4CADC" stop-opacity="0"/></radialGradient>
<filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dx="0" dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.8" fill="#E7EAEF" opacity="0.06"/></pattern>
</defs>
<rect width="700" height="920" fill="url(#bg)"/>
<rect width="700" height="920" fill="url(#dotgrid)"/>
<text x="60" y="80" font-size="11" letter-spacing="2.5" fill="#6B707A" font-family="JetBrains Mono,monospace">— THE FRAMEWORK</text>
<text x="60" y="148" font-size="40" font-weight="200" fill="#E7EAEF">Four pivots.</text>
<text x="60" y="196" font-size="40" font-weight="500" fill="#B4CADC">One transformation.</text>
<g transform="translate(350,580)">
<ellipse cx="0" cy="0" rx="260" ry="260" fill="url(#centerGlow)"/>
<circle cx="0" cy="0" r="180" fill="none" stroke="#2A2E37" stroke-width="0.8"/>
<circle cx="0" cy="0" r="100" fill="none" stroke="#2A2E37" stroke-width="0.6" stroke-dasharray="2 4"/>
<path d="M -140 -140 L 140 -140 L 140 140 L -140 140 Z" fill="none" stroke="#7CA0C7" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.55"/>
<g filter="url(#glow)"><circle cx="0" cy="0" r="42" fill="#B4CADC" opacity="0.3"/></g>
<circle cx="0" cy="0" r="42" fill="#1A1E27" stroke="#7CA0C7" stroke-width="1"/>
<text x="0" y="-2" text-anchor="middle" font-size="8" letter-spacing="2" fill="#B4CADC" font-family="JetBrains Mono,monospace">PIVOT</text>
<text x="0" y="12" text-anchor="middle" font-size="8" letter-spacing="2" fill="#B4CADC" font-family="JetBrains Mono,monospace">MODEL</text>
<g stroke="#7CA0C7" stroke-width="0.8" opacity="0.5"><line x1="-110" y1="-110" x2="-30" y2="-30"/><line x1="110" y1="-110" x2="30" y2="-30"/><line x1="-110" y1="110" x2="-30" y2="30"/><line x1="110" y1="110" x2="30" y2="30"/></g>
<g transform="translate(-140,-140)" filter="url(#dropShadow)"><circle cx="0" cy="0" r="34" fill="url(#node)"/></g>
<text x="-140" y="-134" text-anchor="middle" font-size="20" font-weight="500" fill="#0E0F14">01</text>
<text x="-140" y="-95" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">FOUNDATION</text>
<text x="-140" y="-200" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Operational</text>
<text x="-140" y="-184" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Excellence</text>
<g transform="translate(140,-140)" filter="url(#dropShadow)"><circle cx="0" cy="0" r="34" fill="url(#node)"/></g>
<text x="140" y="-134" text-anchor="middle" font-size="20" font-weight="500" fill="#0E0F14">02</text>
<text x="140" y="-95" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">VELOCITY</text>
<text x="140" y="-200" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Pace of</text>
<text x="140" y="-184" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Evolution</text>
<g transform="translate(-140,140)" filter="url(#dropShadow)"><circle cx="0" cy="0" r="34" fill="url(#node)"/></g>
<text x="-140" y="146" text-anchor="middle" font-size="20" font-weight="500" fill="#0E0F14">03</text>
<text x="-140" y="190" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">ALIGNMENT</text>
<text x="-140" y="216" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Collaboration</text>
<text x="-140" y="232" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">&amp; Alignment</text>
<g transform="translate(140,140)" filter="url(#dropShadow)"><circle cx="0" cy="0" r="34" fill="url(#node)"/></g>
<text x="140" y="146" text-anchor="middle" font-size="20" font-weight="500" fill="#0E0F14">04</text>
<text x="140" y="190" text-anchor="middle" font-size="10" letter-spacing="2.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">IMPACT</text>
<text x="140" y="216" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Business</text>
<text x="140" y="232" text-anchor="middle" font-size="14" font-weight="500" fill="#E7EAEF">Results</text>
</g>
<text x="60" y="880" font-size="10" letter-spacing="2" fill="#6B707A" font-family="JetBrains Mono,monospace">INTERCONNECTED · ITERATIVE · INSTRUMENTABLE</text>
</svg>