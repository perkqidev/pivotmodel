<text x="80" y="-8" text-anchor="middle" font-size="9" letter-spacing="1.5" fill="#0E0F14" font-family="JetBrains Mono,monospace">VP</text>
<g fill="#B4CADC" filter="url(#glow)"><circle cx="-130" cy="72" r="11"/><circle cx="-40" cy="72" r="11"/><circle cx="40" cy="72" r="11"/><circle cx="130" cy="72" r="11"/></g>
</g>
<text x="40" y="430" font-size="13" font-weight="500" fill="#E7EAEF">Engineering Leaders</text>
<text x="40" y="456" font-size="11" font-weight="300" fill="#B4CADC">CTOs · VPs · Directors building the team</text>
