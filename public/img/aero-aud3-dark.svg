<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="Manrope,sans-serif"><defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#161921"/><stop offset="100%" stop-color="#0E0F14"/></linearGradient>
<linearGradient id="bgDark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#0E0F14"/></linearGradient>
<linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#B4CADC"/><stop offset="100%" stop-color="#7CA0C7"/></linearGradient>
<linearGradient id="nodeDark" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7CA0C7"/><stop offset="100%" stop-color="#3a546e"/></linearGradient>
<linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7CA0C7"/><stop offset="100%" stop-color="#B4CADC"/></linearGradient>
<linearGradient id="step1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1c2029"/><stop offset="100%" stop-color="#171a22"/></linearGradient>
<linearGradient id="step2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#222632"/><stop offset="100%" stop-color="#1c2029"/></linearGradient>
<linearGradient id="step3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#B4CADC"/><stop offset="100%" stop-color="#7CA0C7"/></linearGradient>
<radialGradient id="centerGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#7CA0C7" stop-opacity="0.4"/><stop offset="100%" stop-color="#7CA0C7" stop-opacity="0"/></radialGradient>
<radialGradient id="softGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#B4CADC" stop-opacity="0.35"/><stop offset="100%" stop-color="#B4CADC" stop-opacity="0"/></radialGradient>
<filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="4"/><feOffset dx="0" dy="6"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="0" dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.8" fill="#E7EAEF" opacity="0.06"/></pattern>
</defs>
<linearGradient id="areaFill" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#7CA0C7" stop-opacity="0.5"/><stop offset="100%" stop-color="#7CA0C7" stop-opacity="0"/></linearGradient>
<linearGradient id="areaFill2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#B4CADC" stop-opacity="0.55"/><stop offset="100%" stop-color="#B4CADC" stop-opacity="0"/></linearGradient>
<rect width="640" height="520" fill="url(#bg)"/>
<rect width="640" height="520" fill="url(#dotgrid)"/>
<text x="40" y="60" font-size="10" letter-spacing="2.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">— SCALING</text>
<g transform="translate(60,360)">
<g stroke="#2A2E37" stroke-width="0.6"><line x1="0" y1="0" x2="520" y2="0"/><line x1="0" y1="-60" x2="520" y2="-60" stroke-dasharray="2 4"/><line x1="0" y1="-120" x2="520" y2="-120" stroke-dasharray="2 4"/><line x1="0" y1="-180" x2="520" y2="-180" stroke-dasharray="2 4"/></g>
<path d="M 0 -30 L 80 -55 L 180 -85 L 280 -130 L 380 -160 L 480 -200 L 480 0 L 0 0 Z" fill="url(#areaFill)"/>
<path d="M 0 -20 L 80 -40 L 180 -65 L 280 -95 L 380 -115 L 480 -145 L 480 0 L 0 0 Z" fill="url(#areaFill2)"/>
<polyline points="0,-30 80,-55 180,-85 280,-130 380,-160 480,-200" fill="none" stroke="#B4CADC" stroke-width="2"/>
<g fill="#B4CADC" filter="url(#glow)"><circle cx="0" cy="-30" r="4"/><circle cx="80" cy="-55" r="4"/><circle cx="180" cy="-85" r="4"/><circle cx="280" cy="-130" r="4"/><circle cx="380" cy="-160" r="4"/></g>
<g filter="url(#glow)"><circle cx="480" cy="-200" r="9" fill="#B4CADC"/></g>
<circle cx="480" cy="-200" r="14" fill="none" stroke="#B4CADC" opacity="0.5"/>
<circle cx="480" cy="-200" r="20" fill="none" stroke="#B4CADC" opacity="0.25"/>
<text x="495" y="-198" font-size="9" letter-spacing="1.5" fill="#B4CADC" font-family="JetBrains Mono,monospace">L3</text>
<g font-size="9" font-family="JetBrains Mono,monospace" fill="#6B707A" letter-spacing="1"><text x="0" y="20">Q1</text><text x="80" y="20">Q2</text><text x="180" y="20">Q3</text><text x="280" y="20">Q4</text><text x="380" y="20">Q5</text><text x="480" y="20">+1Y</text></g>
</g>
<text x="40" y="430" font-size="13" font-weight="500" fill="#E7EAEF">Growth-Stage Orgs</text>
<text x="40" y="456" font-size="11" font-weight="300" fill="#A8AEB8">Scaling with rigour, not headcount alone</text>
</svg>